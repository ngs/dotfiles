name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check shell scripts
        run: |
          # 各スクリプトの shebang を見て、bash なら bash -n、それ以外 (#!/bin/sh
          # = dash 等) は sh -n で構文チェックする。bash -n は dash で落ちる
          # 構文を見逃すため、実際に使われるインタプリタに合わせて検査する。
          status=0
          while IFS= read -r -d '' f; do
            case "$(head -n1 "$f")" in
              *bash*) checker="bash -n" ;;
              *)      checker="sh -n" ;;
            esac
            echo "==> $checker $f"
            $checker "$f" || status=1
          done < <(find setup.sh script/setup-ubuntu.sh setup.d -name '*.sh' -print0)
          exit $status

  ubuntu-setup:
    # Codespaces / WSL の Ubuntu セットアップ (apt + 並列 *env install) を実走する
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DOTFILES_SETUP_LOGDIR: /tmp/dotfiles-setup-logs
    steps:
      - uses: actions/checkout@v4

      - name: Run Ubuntu setup
        run: ./script/setup-ubuntu.sh

      - name: Verify installed versions
        run: |
          set -euo pipefail
          export PATH="$HOME/.nodenv/bin:$HOME/.rbenv/bin:$HOME/.pyenv/bin:$HOME/.goenv/bin:$PATH"
          eval "$(nodenv init -)"
          eval "$(rbenv init -)"
          eval "$(pyenv init -)"
          eval "$(goenv init -)"

          # ピン留めバージョンは各 setup スクリプトの VERSION= から抽出し、
          # ここでハードコードしないことで定義のドリフトを防ぐ。
          expected_version() {
            sed -n 's/^VERSION=\(.*\)$/\1/p' "$1" | head -n1
          }

          status=0
          assert_version() {
            name="$1"; expected="$2"; actual="$3"
            if [ "$expected" = "$actual" ]; then
              echo "✓ $name: $actual (expected $expected)"
            else
              echo "✗ $name: got '$actual', expected '$expected'"
              status=1
            fi
          }

          node_expected="$(expected_version setup.d/ubuntu/002-nodenv.sh)"
          ruby_expected="$(expected_version setup.d/ubuntu/003-rbenv.sh)"
          python_expected="$(expected_version setup.d/ubuntu/004-pyenv.sh)"
          go_expected="$(expected_version setup.d/ubuntu/005-goenv.sh)"

          # node --version → "v24.16.0" の先頭 v を除去
          assert_version node "$node_expected" "$(node --version | sed 's/^v//')"
          # ruby --version → "ruby 4.0.5 (...) ..." の 2 フィールド目
          assert_version ruby "$ruby_expected" "$(ruby --version | awk '{print $2}')"
          # python --version → "Python 3.14.6" の 2 フィールド目
          assert_version python "$python_expected" "$(python --version | awk '{print $2}')"
          # go version → "go version go1.26.4 linux/amd64" の go プレフィックスを除去
          assert_version go "$go_expected" "$(go version | awk '{print $3}' | sed 's/^go//')"

          gcloud --version

          exit $status

      - name: Upload setup logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setup-logs
          path: /tmp/dotfiles-setup-logs/
          if-no-files-found: ignore
